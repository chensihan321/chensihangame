<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>记忆翻牌小游戏</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>记忆翻牌小游戏</h1>
    <div class="info">
      <span>步数：<span id="steps">0</span></span>
      <span>时间：<span id="time">0</span> 秒</span>
    </div>
    <div id="board" class="board"></div>
    <button id="restart">重新开始</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
